<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Bou 💙</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

<style>
    /* 🌌 Clean Dark Atmosphere */
    body {
        margin: 0;
        padding: 0;
        font-family: 'Quicksand', sans-serif;
        background: linear-gradient(to bottom, #0f172a, #000000);
        color: #f1f5f9;
        text-align: center;
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: background 2s ease; /* Smooth background change */
    }

    /* ⭐ Background Stars */
    .star {
        position: fixed;
        background: white;
        border-radius: 50%;
        opacity: 0.6;
        animation: twinkle 3s infinite ease-in-out;
        z-index: -1;
    }

    @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* 📦 Main Layout */
    .container {
        max-width: 600px;
        width: 90%;
        padding: 40px 20px;
        margin-top: 5vh;
        z-index: 10;
    }

    /* ✨ Typography */
    h1 {
        font-family: 'Dancing Script', cursive;
        font-size: 3rem;
        margin-bottom: 5px;
        color: #003bd1;
        font-weight: 600;
    }

    h2 {
        font-family: 'Dancing Script', cursive;
        font-size: 1.8rem;
        margin-top: 50px;
        margin-bottom: 25px;
        color: #e2e8f0;
        font-weight: 400;
    }

    p {
        font-size: 1.1rem;
        line-height: 1.8;
        font-weight: 300;
        color: #cbd5e1;
    }

    /* 🖋️ Clean Input */
    input[type="text"] {
        background: transparent;
        border: none;
        border-bottom: 1px solid #003bd1;
        color: white;
        padding: 10px;
        font-size: 1.1rem;
        text-align: center;
        width: 80%;
        margin-top: 20px;
        outline: none;
        font-family: 'Quicksand', sans-serif;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.3);
        font-size: 0.9rem;
    }

    /* 🌸 Ghost Buttons */
    button {
        background: transparent;
        border: 1px solid #003bd1;
        color: #003bd1;
        padding: 10px 25px;
        font-size: 0.95rem;
        border-radius: 50px;
        cursor: pointer;
        margin: 8px;
        transition: all 0.4s ease;
        font-family: 'Quicksand', sans-serif;
        font-weight: 500;
    }

    button:hover {
        background: #003bd1;
        color: #0f172a;
        transform: translateY(-2px);
    }

    /* 📜 Story Reading Area */
    #futureBox {
        text-align: left;
        margin-top: 30px;
        min-height: 100px;
        font-size: 1rem;
        color: #fff;
        padding: 10px;
    }

    .hidden { display: none; }
    
    .fade-in { animation: fadeIn 2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .footer {
        margin-top: 80px;
        font-size: 0.8rem;
        opacity: 0.4;
        padding-bottom: 20px;
    }

</style>
</head>

<body>

<audio id="bgMusic" src="sound.mp3" loop></audio>

<!-- 🔐 LOCK SCREEN -->
<div class="container" id="lockScreen">
    <h1 style="font-size: 2.5rem;">For My Bou 💙</h1>
    <p>Enter the date created for us...</p>
    
    <input type="text" id="password" placeholder="dao dao pass dao(our 1st conversation date)" autocomplete="off">
    <br><br>
    <button onclick="unlock()">Enter 💙</button>
    <p id="wrong" style="color:#ef4444; font-size: 0.9rem; margin-top: 10px;"></p>
</div>

<!-- 💙 MAIN CONTENT -->
<div class="container hidden" id="mainContent">

    <h1>Hey Bouuu 💙</h1>
    <p style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 30px;">Turn on your sound 🎵</p>

    <!-- Intro Typing -->
    <div id="typingText" style="min-height: 80px;"></div>

    <h2>Our Dreams</h2>
    
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
        <button onclick="showMsg(3)">The Wedding 💍</button>
		<button onclick="showMsg(1)">Our First Trip ✈️</button>
		<button onclick="showMsg(2)">First Home We Bought 🏡</button>
        <button onclick="showMsg(4)">Growing Old 👵👴</button>
    </div>

    <!-- Story Display Area -->
    <div id="futureBox"></div>

    <!-- Ending Typing -->
    <div id="endingText" style="margin-top: 40px; text-align: center;"></div>

    <h2 style="font-size: 1.5rem;">Will you be my "Buriiii"?👵🥹</h2>

    <button onclick="love()">Yes💖</button>
    <button onclick="love()">Always🙃🫠</button>

    <!-- Love Message Animation -->
    <div id="loveMsg" style="margin-top: 20px; color: #003bd1; font-weight: bold; min-height: 30px;"></div>

    <div class="footer">
        Made by Labib for his sweety bouu🫠🙃<br>
	love anniversary 27th January 💫
    </div>

</div>

<script>
// ✨ Minimalist Stars
function createStars() {
    const starCount = 80;
    for(let i=0; i<starCount; i++){
        let star = document.createElement("div");
        star.classList.add("star");
        
        let size = Math.random() * 2;
        star.style.width = size + "px";
        star.style.height = size + "px";
        
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        
        star.style.animationDelay = Math.random() * 3 + "s";
        
        document.body.appendChild(star);
    }
}
createStars();

// 📝 Content
let introText = "You know...? I never understood when exactly you became my habit. But now, a day without you feels incomplete. You are my peace, my chaos, and my safest place. 💙";

let endingFinal = "No matter how much we fight or annoy each other... at the end of the day, I still choose you. Again. And again. And again.";

// 🔐 Unlock
function unlock() {
    let pass = document.getElementById("password").value.toLowerCase();

    if(pass.includes("27") && pass.includes("january")) {
        let lock = document.getElementById("lockScreen");
        lock.style.transition = "opacity 1s";
        lock.style.opacity = 0;

        setTimeout(() => {
            lock.style.display = "none";
            let main = document.getElementById("mainContent");
            main.classList.remove("hidden");
            main.classList.add("fade-in");
            
            document.getElementById("bgMusic").play().catch(() => console.log("Audio requires interaction"));

            typeText("typingText", introText, 40);
        }, 1000);

    } else {
        document.getElementById("wrong").innerText = "aaaaaaaaa....!!! Jantam tumi amake bhalobasho na🤧🤧🤧";
    }
}

// ⌨️ Typing Function
function typeText(id, text, speed) {
    let i = 0;
    let element = document.getElementById(id);
    element.innerHTML = "";
    
    if(element.dataset.interval) clearInterval(element.dataset.interval);

    let interval = setInterval(() => {
        // Handle Line Breaks specifically
        if (text.substring(i, i + 4) === "<br>") {
            element.innerHTML += "<br>";
            i += 4;
        } else {
            element.innerHTML += text.charAt(i);
            i++;
        }

        if(i >= text.length) clearInterval(interval);
    }, speed);
    
    element.dataset.interval = interval;
}

// 📖 Stories

    document.getElementById("futureBox").innerHTML = ""; 

    if(n==1) text = "7 mash hoye geche amader biyer. ei dirgho shomoy dhore tumi ar ami dui pagol-pagli husband-wife er role play korchi. shudhu parthokkho holo, eta bastobe. Tumi amar cutie wifuuuuu. ar ami tomar chagol shami.🙂 amra husband-wife hoye gechi thik e, kintu ekahne j kono dayitto ba gomvirota ache amra sheta janio na. seriousness bole kono shobdoi nei amader majhe. tumi gosol shesh kore bathroom theke ber hou, ar ber holei ami chomke dei. tumi voy peye lafiye Otho, then raage kiti miti hoye ovaber amar pichon pichon echutte shuru koro. ami jokhon nijer daari thik korte jai, tumi razor niye paliye jao. jokhon ranna ghore ranna koro ami pichon theke lukiye lukiye giye hut kore joriye dhori. tumi abaro chomke Otho. kintu ebar aar raag koro na. tumi kaj koro, aar ami tomar shathe shathe akaj kori.🙂 onek moja kori dujon. sharadin nana rokom paglamo and dushtami diyei din katiye dei. tomar phool onek pochondo, tai ami majhe majhe nana rokom phool er chara niye ashi, ar tumi sheta niye giye chader opore lagao. tomar onek iccha bashar chhader opore ordhek chhad jure ekta phooler bagan korar. kintu joto bar e chara gaach lagu, toto baar e bashar beyadob chagol chhader opore giye shegulo kheye nei.😒🥲(btw, ei chagol ami na kintu.🥲🙏 eta original chagol) sharadin bashai eto rokom moja kori dujon, kintu sheshbar haneymoon a ekta proper getaway chara ar dure kothao ajo ghurte jawa hoi ni. Tai tumi goto duidin theke onek abdar korcbo ghurte jawar jonne. majhe majhe threat o diccho, 'ebar jodi ghurte niye na jao, thaole agami ek shoptaho ami ammur shathe ghumabo😒.' dangerous threat!🥲🙏 kintu tar poro ami kichu na kichu bahana dicchi bar bar. na jawar bahana ta to just chuto😋 tumi jokhon emon cute cute abdaar koro, and emon cute+dangerous type threat dao, tokhon tomake dekhte etttoooo shundor and innocent lage… tomar oi innocent face ta dekhar jonnei tomake icche kore aro birokto korchi ami.🙂 kintu edike vitore vitore amaro khub iccha korche tomar shathe kothao ghurte jaw     if(n==2) text = "Etao unavailable(romantic kotha bolte chaichila.😒)";
    
    if(n==3) text = "Unavailable(planning korar try korchilam. tumie koro nai.😒)";
    
    if(n==4) text = "Shob e unavailable(aro romantic kotha bolo.😒)";

    typeText("futureBox", text, 20);
    
    if(n==4 || n==1) {
        setTimeout(() => {
            typeText("endingText", endingFinal, 40);
        }, text.length * 20 + 1000);
    }
}

// 💖 Live Writing Love Message
function love() {
    // 1. Change Background
    document.body.style.background = "linear-gradient(to bottom, #1e1b4b, #000)";

    // 2. Animate the text
    let finalMsg = "I knew it! You are stuck with me forever. 😌💙";
    typeText("loveMsg", finalMsg, 50);
}
</script>

</body>
</html>
